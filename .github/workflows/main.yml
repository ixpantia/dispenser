name: Build Packages

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.os }} Package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [debian-12, debian-13, ubuntu-24, rhel-8, rhel-9]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore target directory cache
        uses: actions/cache/restore@v4
        with:
          path: target
          key: ${{ matrix.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-target-

      - name: Setup Just
        uses: extractions/setup-just@v3
        with:
          just-version: 1.42.4

      - name: Build package
        run: just build-${{ matrix.os }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dispenser-${{ matrix.os }}
          path: |
            *.deb
            rpmout/RPMS/x86_64/*.rpm

      - name: Save target directory cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: target
          key: ${{ matrix.os }}-target-${{ hashFiles('**/Cargo.lock') }}
